<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot password — Medtronic Labs Digital Health Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(135deg,#EEF0FB 0%,#F8F9FF 45%,#E8F8F5 100%);color:#0D1117}
input,button{font-family:inherit}

.brand{display:flex;align-items:center;gap:10px;padding:24px 32px}
.brand-logo{height:32px;width:auto;object-fit:contain}
.brand-div{width:1px;height:22px;background:#E5E7EB;flex-shrink:0}
.brand-sub{font-size:12px;font-weight:400;color:#6B7280}

.page-center{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(75,72,229,.08),0 1px 4px rgba(0,0,0,.06);padding:40px 44px;width:100%;max-width:440px}
.card-title{font-size:18px;font-weight:600;color:#0D1117;margin-bottom:8px;text-align:center}
.card-sub{font-size:13px;color:#6B7280;margin-bottom:26px;text-align:center;line-height:1.5}

.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;color:#0D1117;background:#FAFAFA;transition:border-color .15s,background .15s;outline:none}
.field input:focus{border-color:#4B48E5;background:#fff}
.field input::placeholder{color:#9CA3AF}

.btn-primary{width:100%;padding:13px;background:#4B48E5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#3B38D5}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

.card-footer{margin-top:20px;text-align:center;font-size:13px;color:#6B7280}
.card-footer a{color:#4B48E5;font-weight:500;text-decoration:none}
.card-footer a:hover{text-decoration:underline}

.error-msg{background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;border-radius:6px;padding:10px 13px;font-size:13px;margin-bottom:16px;display:none}
.success-msg{background:#F0FDF4;border:1px solid #BBF7D0;color:#15803D;border-radius:6px;padding:16px;font-size:14px;text-align:center;display:none;line-height:1.5}
.success-msg strong{display:block;font-size:15px;margin-bottom:4px}

.page-footer{text-align:center;padding:16px;font-size:11.5px;color:#9CA3AF}
</style>
</head>
<body>

<div class="brand">
  <img src="/public/MDT Main Logo.png" alt="Medtronic Labs" class="brand-logo">
  <div class="brand-div"></div>
  <span class="brand-sub">Digital Health Scanner</span>
</div>

<div class="page-center">
  <div class="card">
    <div class="card-title">Forgot your password?</div>
    <div class="card-sub">Enter your work email and we'll send you a link to reset it.</div>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg">
      <strong>Check your inbox</strong>
      If that email is registered you'll receive a reset link shortly. Check your spam folder too.
    </div>

    <form id="forgot-form" onsubmit="handleForgot(event)">
      <div class="field">
        <label for="email">Work email</label>
        <input type="email" id="email" placeholder="you@medtroniclabs.org" required autocomplete="email"/>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">Send reset link</button>
    </form>

    <div class="card-footer">
      <a href="/login">← Back to sign in</a>
    </div>
  </div>
</div>

<div class="page-footer">
  Version: v1.0.0 &nbsp;·&nbsp; © Medtronic Labs. All rights reserved
</div>

<script>
async function handleForgot(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const err = document.getElementById('error-msg');
  const suc = document.getElementById('success-msg');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    const r = await fetch('/auth/forgot-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: document.getElementById('email').value.trim()}),
    });
    if (r.ok) {
      document.getElementById('forgot-form').style.display = 'none';
      suc.style.display = 'block';
    } else {
      const d = await r.json();
      err.textContent = d.detail || 'Something went wrong. Please try again.';
      err.style.display = 'block';
    }
  } catch {
    err.textContent = 'Network error — please try again.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
}
</script>
</body>
</html>
